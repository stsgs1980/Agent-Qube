<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="enable-background:new 0 0 32 32;" xml:space="preserve">
<defs>
  <style type="text/css">
    .cube-face-front { fill: #06B6D4; opacity: 0.9; }
    .cube-face-top { fill: #22D3EE; opacity: 0.85; }
    .cube-face-right { fill: #0891B2; opacity: 0.8; }
    .cube-edge { fill: none; stroke: #06B6D4; stroke-width: 0.5; stroke-linejoin: round; }
    .glow-line { fill: none; stroke: #22D3EE; stroke-width: 0.3; opacity: 0.6; }
    .q-letter { fill: #FFFFFF; font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }

    .cube-glow {
      animation: cubeGlow 2.5s ease-in-out infinite;
    }
    @keyframes cubeGlow {
      0%, 100% { filter: drop-shadow(0 0 1px rgba(6, 182, 212, 0.4)); }
      50% { filter: drop-shadow(0 0 3px rgba(6, 182, 212, 0.8)); }
    }
  </style>
</defs>

<g class="cube-glow">
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon class="cube-face-top" points="16,4 28,10 16,16 4,10"/>
  <!-- Left face -->
  <polygon class="cube-face-front" points="4,10 16,16 16,28 4,22"/>
  <!-- Right face -->
  <polygon class="cube-face-right" points="16,16 28,10 28,22 16,28"/>

  <!-- Edges -->
  <polygon class="cube-edge" points="16,4 28,10 16,16 4,10"/>
  <polygon class="cube-edge" points="4,10 16,16 16,28 4,22"/>
  <polygon class="cube-edge" points="16,16 28,10 28,22 16,28"/>

  <!-- Inner glow lines -->
  <line class="glow-line" x1="16" y1="4" x2="16" y2="16"/>
  <line class="glow-line" x1="4" y1="10" x2="4" y2="22"/>
  <line class="glow-line" x1="28" y1="10" x2="28" y2="22"/>

  <!-- Q letter on front face -->
  <text x="8" y="22" class="q-letter">Q</text>
</g>
</svg>
